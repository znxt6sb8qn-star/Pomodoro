<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pomodoro — Révisions Dentaires</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
–bg: #080d1a;
–surface: #0f1628;
–surface2: #172035;
–border: #1e2d4a;
–accent: #5b9cf6;
–accent2: #f472b6;
–accent3: #a78bfa;
–text: #eef2ff;
–muted: #6475a3;
–work-color: #5b9cf6;
–break-color: #f472b6;
–long-color: #a78bfa;
}

body {
background: var(–bg);
color: var(–text);
font-family: ‘DM Sans’, sans-serif;
min-height: 100vh;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
padding: 20px;
overflow-x: hidden;
}

/* Background grain */
body::before {
content: ‘’;
position: fixed;
inset: 0;
background-image: url(“data:image/svg+xml,%3Csvg viewBox=‘0 0 256 256’ xmlns=‘http://www.w3.org/2000/svg’%3E%3Cfilter id=‘noise’%3E%3CfeTurbulence type=‘fractalNoise’ baseFrequency=‘0.9’ numOctaves=‘4’ stitchTiles=‘stitch’/%3E%3C/filter%3E%3Crect width=‘100%25’ height=‘100%25’ filter=‘url(%23noise)’ opacity=‘0.04’/%3E%3C/svg%3E”);
pointer-events: none;
z-index: 0;
}

.app {
position: relative;
z-index: 1;
width: 100%;
max-width: 480px;
}

/* Header */
.header {
text-align: center;
margin-bottom: 32px;
}

.header-title {
font-family: ‘DM Serif Display’, serif;
font-size: 13px;
letter-spacing: 0.25em;
text-transform: uppercase;
color: var(–muted);
margin-bottom: 4px;
}

.header-sub {
font-family: ‘DM Serif Display’, serif;
font-size: 11px;
letter-spacing: 0.15em;
text-transform: uppercase;
color: var(–accent);
opacity: 0.7;
}

/* Mode tabs */
.mode-tabs {
display: flex;
background: var(–surface);
border: 1px solid var(–border);
border-radius: 12px;
padding: 4px;
margin-bottom: 28px;
gap: 2px;
}

.mode-tab {
flex: 1;
padding: 8px 6px;
border: none;
background: transparent;
color: var(–muted);
font-family: ‘DM Sans’, sans-serif;
font-size: 11px;
font-weight: 500;
letter-spacing: 0.05em;
border-radius: 9px;
cursor: pointer;
transition: all 0.2s;
text-transform: uppercase;
}

.mode-tab.active {
background: var(–surface2);
color: var(–text);
}

.mode-tab[data-mode=“work”].active { color: var(–work-color); }
.mode-tab[data-mode=“break”].active { color: var(–break-color); }
.mode-tab[data-mode=“long”].active { color: var(–long-color); }

/* Timer card */
.timer-card {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 24px;
padding: 40px 32px 32px;
margin-bottom: 20px;
position: relative;
overflow: hidden;
}

.timer-card::before {
content: ‘’;
position: absolute;
top: -80px;
left: 50%;
transform: translateX(-50%);
width: 320px;
height: 320px;
border-radius: 50%;
background: radial-gradient(circle, var(–glow-color, #e8c97a22) 0%, transparent 70%);
transition: background 0.6s;
pointer-events: none;
}

/* SVG ring */
.ring-container {
position: relative;
width: 220px;
height: 220px;
margin: 0 auto 28px;
}

.ring-svg {
transform: rotate(-90deg);
width: 100%;
height: 100%;
}

.ring-bg {
fill: none;
stroke: var(–border);
stroke-width: 3;
}

.ring-progress {
fill: none;
stroke: var(–accent);
stroke-width: 3;
stroke-linecap: round;
stroke-dasharray: 628;
stroke-dashoffset: 0;
transition: stroke-dashoffset 1s linear, stroke 0.6s;
}

.timer-center {
position: absolute;
inset: 0;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
}

.timer-display {
font-family: ‘DM Mono’, monospace;
font-size: 54px;
font-weight: 300;
letter-spacing: -0.02em;
color: var(–text);
line-height: 1;
}

.timer-mode-label {
font-size: 11px;
letter-spacing: 0.2em;
text-transform: uppercase;
color: var(–muted);
margin-top: 6px;
}

/* Session dots */
.session-dots {
display: flex;
justify-content: center;
gap: 8px;
margin-bottom: 28px;
}

.dot {
width: 8px;
height: 8px;
border-radius: 50%;
background: var(–border);
transition: background 0.3s;
}

.dot.done { background: var(–accent); }
.dot.active {
background: var(–accent);
box-shadow: 0 0 8px var(–accent);
animation: pulse-dot 1.5s infinite;
}

@keyframes pulse-dot {
0%, 100% { opacity: 1; }
50% { opacity: 0.4; }
}

/* Controls */
.controls {
display: flex;
align-items: center;
justify-content: center;
gap: 16px;
}

.btn-secondary {
width: 44px;
height: 44px;
border-radius: 50%;
border: 1px solid var(–border);
background: var(–surface2);
color: var(–muted);
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
transition: all 0.2s;
font-size: 16px;
}

.btn-secondary:hover { color: var(–text); border-color: var(–text); }

.btn-primary {
width: 68px;
height: 68px;
border-radius: 50%;
border: none;
background: var(–accent);
color: #0e0e10;
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
font-size: 22px;
transition: all 0.2s;
box-shadow: 0 0 0 0 var(–accent);
}

.btn-primary:hover {
transform: scale(1.05);
box-shadow: 0 0 24px var(–accent-glow, #e8c97a55);
}

.btn-primary.running {
animation: pulse-btn 2s infinite;
}

@keyframes pulse-btn {
0%, 100% { box-shadow: 0 0 0 0 var(–accent-glow, #e8c97a33); }
50% { box-shadow: 0 0 0 12px transparent; }
}

/* Task input */
.task-card {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 16px;
padding: 16px 20px;
margin-bottom: 16px;
}

.task-label {
font-size: 10px;
letter-spacing: 0.2em;
text-transform: uppercase;
color: var(–muted);
margin-bottom: 10px;
}

.task-input {
width: 100%;
background: transparent;
border: none;
color: var(–text);
font-family: ‘DM Sans’, sans-serif;
font-size: 14px;
outline: none;
placeholder-color: var(–muted);
}

.task-input::placeholder { color: var(–muted); }

/* Stats row */
.stats-row {
display: grid;
grid-template-columns: 1fr 1fr 1fr;
gap: 10px;
margin-bottom: 16px;
}

.stat-box {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 12px;
padding: 14px 12px 10px;
text-align: center;
position: relative;
}

.stat-reset {
position: absolute;
top: 6px;
right: 7px;
width: 18px;
height: 18px;
border-radius: 50%;
border: 1px solid var(–border);
background: var(–surface2);
color: var(–muted);
font-size: 9px;
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
transition: all 0.2s;
line-height: 1;
}

.stat-reset:hover { color: var(–accent2); border-color: var(–accent2); }

.stat-value {
font-family: ‘DM Mono’, monospace;
font-size: 22px;
font-weight: 400;
color: var(–accent);
line-height: 1;
margin-bottom: 4px;
}

.stat-label {
font-size: 10px;
letter-spacing: 0.12em;
text-transform: uppercase;
color: var(–muted);
}

/* Settings */
.settings-card {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 16px;
padding: 16px 20px;
}

.settings-label {
font-size: 10px;
letter-spacing: 0.2em;
text-transform: uppercase;
color: var(–muted);
margin-bottom: 14px;
}

.settings-grid {
display: grid;
grid-template-columns: 1fr 1fr 1fr;
gap: 12px;
}

.setting-item label {
display: block;
font-size: 10px;
color: var(–muted);
margin-bottom: 6px;
letter-spacing: 0.05em;
}

.setting-item input {
width: 100%;
background: var(–surface2);
border: 1px solid var(–border);
border-radius: 8px;
color: var(–text);
font-family: ‘DM Mono’, monospace;
font-size: 15px;
padding: 8px 10px;
outline: none;
text-align: center;
transition: border-color 0.2s;
}

.setting-item input:focus { border-color: var(–accent); }

/* Notification */
.notif {
position: fixed;
top: 20px;
left: 50%;
transform: translateX(-50%) translateY(-80px);
background: var(–surface2);
border: 1px solid var(–border);
border-radius: 12px;
padding: 12px 20px;
font-size: 13px;
color: var(–text);
transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
z-index: 100;
white-space: nowrap;
}

.notif.show { transform: translateX(-50%) translateY(0); }

/* Color theming per mode */
body[data-mode=“work”] {
–accent: #5b9cf6;
–accent-glow: #5b9cf655;
–glow-color: #5b9cf618;
}
body[data-mode=“break”] {
–accent: #f472b6;
–accent-glow: #f472b655;
–glow-color: #f472b618;
}
body[data-mode=“long”] {
–accent: #a78bfa;
–accent-glow: #a78bfa55;
–glow-color: #a78bfa18;
}

.ring-progress { stroke: var(–accent); }
.stat-value { color: var(–accent); }
</style>

</head>

    <div class="stat-box">

      <div class="stat-value" id="minutesCount">0</div>
      <div class="stat-label">Minutes</div>
    </div>

      <button class="stat-reset" onclick="resetStat('breaks')" title="Réinitialiser">✕</button>

      </div>

        <label>Pause</label>
        <input type="number" id="breakDur" value="5" min="1" max="30" onchange="updateDurations()">
      </div>
      <div class="setting-item">

        <input type="number" id="longDur" value="15" min="1" max="60" onchange="updateDurations()">

<script>
const CIRCUMFERENCE = 2 * Math.PI * 100; // 628.3

const modes = {
  work: { label: 'Travail', key: 'workDur' },
  break: { label: 'Pause courte', key: 'breakDur' },
  long: { label: 'Longue pause', key: 'longDur' }
};

let currentMode = 'work';
let timeLeft = 25 * 60;
let totalTime = 25 * 60;
let running = false;
let interval = null;
let sessionsCompleted = 0;
let breaksCompleted = 0;
let totalMinutes = 0;
const SESSIONS_BEFORE_LONG = 4;

function getDuration(mode) {
  const key = modes[mode].key;
  return parseInt(document.getElementById(key).value) * 60;
}

function updateDurations() {
  if (!running) {
    totalTime = getDuration(currentMode);
    timeLeft = totalTime;
    updateDisplay();
    updateRing();
  }
}

function switchMode(mode) {
  if (running) return;
  currentMode = mode;
  document.body.setAttribute('data-mode', mode);
  document.querySelectorAll('.mode-tab').forEach(t => t.classList.toggle('active', t.dataset.mode === mode));
  document.getElementById('mode-label').textContent = modes[mode].label;
  totalTime = getDuration(mode);
  timeLeft = totalTime;
  updateDisplay();
  updateRing();
}

function updateDisplay() {
  const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
  const s = (timeLeft % 60).toString().padStart(2, '0');
  document.getElementById('display').textContent = `${m}:${s}`;
  document.title = `${m}:${s} — Pomodoro`;
}

function updateRing() {
  const progress = timeLeft / totalTime;
  const offset = CIRCUMFERENCE * (1 - progress);
  document.getElementById('ring').style.strokeDashoffset = offset;
}

function updateDots() {
  const container = document.getElementById('dots');
  container.innerHTML = '';
  for (let i = 0; i < SESSIONS_BEFORE_LONG; i++) {
    const dot = document.createElement('div');
    dot.className = 'dot';
    if (i < sessionsCompleted % SESSIONS_BEFORE_LONG) dot.classList.add('done');
    else if (i === sessionsCompleted % SESSIONS_BEFORE_LONG && currentMode === 'work' && running) dot.classList.add('active');
    container.appendChild(dot);
  }
}

function toggleTimer() {
  if (running) {
    pauseTimer();
  } else {
    startTimer();
  }
}

function startTimer() {
  running = true;
  document.getElementById('playBtn').textContent = '⏸';
  document.getElementById('playBtn').classList.add('running');
  updateDots();
  interval = setInterval(() => {
    timeLeft--;
    updateDisplay();
    updateRing();
    if (timeLeft <= 0) {
      clearInterval(interval);
      onTimerEnd();
    }
  }, 1000);
}

function pauseTimer() {
  running = false;
  clearInterval(interval);
  document.getElementById('playBtn').textContent = '▶';
  document.getElementById('playBtn').classList.remove('running');
}

function resetTimer() {
  pauseTimer();
  totalTime = getDuration(currentMode);
  timeLeft = totalTime;
  updateDisplay();
  updateRing();
  updateDots();
}

function onTimerEnd() {
  running = false;
  document.getElementById('playBtn').textContent = '▶';
  document.getElementById('playBtn').classList.remove('running');

  playSound();
  showNotif();

  if (currentMode === 'work') {
    sessionsCompleted++;
    totalMinutes += getDuration('work') / 60;
    document.getElementById('sessionsCount').textContent = sessionsCompleted;
    document.getElementById('minutesCount').textContent = totalMinutes;

    if (sessionsCompleted % SESSIONS_BEFORE_LONG === 0) {
      setTimeout(() => switchMode('long'), 800);
    } else {
      setTimeout(() => switchMode('break'), 800);
    }
  } else {
    breaksCompleted++;
    document.getElementById('breakCount').textContent = breaksCompleted;
    setTimeout(() => switchMode('work'), 800);
  }
}

function resetStat(stat) {
  if (stat === 'sessions') {
    sessionsCompleted = 0;
    document.getElementById('sessionsCount').textContent = 0;
    updateDots();
  } else if (stat === 'minutes') {
    totalMinutes = 0;
    document.getElementById('minutesCount').textContent = 0;
  } else if (stat === 'breaks') {
    breaksCompleted = 0;
    document.getElementById('breakCount').textContent = 0;
  }
}

function skipSession() {
  pauseTimer();
  timeLeft = 0;
  updateDisplay();
  updateRing();
  onTimerEnd();
}

function showNotif() {
  const labels = {
    work: '✅ Session terminée ! Pause méritée.',
    break: '💪 Pause terminée ! Au travail.',
    long: '🔥 Longue pause terminée !'
  };
  const notif = document.getElementById('notif');
  notif.textContent = labels[currentMode];
  notif.classList.add('show');
  setTimeout(() => notif.classList.remove('show'), 3000);
}

function playSound() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const freqs = currentMode === 'work' ? [523, 659, 784] : [784, 659, 523];
    freqs.forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.value = freq;
      osc.type = 'sine';
      gain.gain.setValueAtTime(0, ctx.currentTime + i * 0.18);
      gain.gain.linearRampToValueAtTime(0.15, ctx.currentTime + i * 0.18 + 0.05);
      gain.gain.linearRampToValueAtTime(0, ctx.currentTime + i * 0.18 + 0.3);
      osc.start(ctx.currentTime + i * 0.18);
      osc.stop(ctx.currentTime + i * 0.18 + 0.35);
    });
  } catch(e) {}
}

// Init
document.getElementById('ring').style.strokeDasharray = CIRCUMFERENCE;
document.getElementById('ring').style.strokeDashoffset = 0;
updateDisplay();
updateDots();
</script>

</body>
